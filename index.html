<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Enigma2 Converter</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        textarea { width: 90%; height: 300px; background: #222; color: #00ff00; border: 1px solid #444; padding: 10px; font-family: monospace; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
        .controls { margin: 20px; }
        input { padding: 8px; border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <h2>IPTV to Enigma2 (Fast Converter)</h2>
    <p>Paste links -> Click Convert -> Download</p>

    <textarea id="data" placeholder="Paste #EXTM3U links here..."></textarea>

    <div class="controls">
        <button class="btn" onclick="convert('4097:0:1')">Convert (4097)</button>
        <button class="btn" onclick="convert('5002:0:1')">Convert (5002)</button>
        <button class="btn" style="background:#dc3545" onclick="document.getElementById('data').value=''">Clear</button>
    </div>

    <div class="controls">
        <input type="text" id="bName" value="MyCustomBouquet">
        <button class="btn" style="background:#28a745" onclick="download()">Download .tv File</button>
    </div>

    <script>
        function convert(stype) {
            const area = document.getElementById('data');
            const name = document.getElementById('bName').value || "Bouquet";
            const lines = area.value.split('\n');
            let output = "#NAME " + name + "\n";
            let currentName = "";

            for (let line of lines) {
                line = line.trim();
                if (line.includes("#EXTINF")) {
                    currentName = line.split(',')[1] || "Channel";
                } else if (line.startsWith("http")) {
                    let safeUrl = line.replace(/:/g, '%3a');
                    output += "#SERVICE " + stype + ":0:0:0:0:0:0:0:" + safeUrl + ":" + currentName + "\n";
                    output += "#DESCRIPTION " + currentName + "\n";
                    currentName = "";
                }
            }
            area.value = output;
        }

        function download() {
            const text = document.getElementById('data').value;
            const bName = document.getElementById('bName').value || "userbouquet";
            if(!text.includes("#SERVICE")) { alert("Convert first!"); return; }
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "userbouquet." + bName + ".tv";
            a.click();
        }
    </script>
</body>
</html>
