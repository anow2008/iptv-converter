<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E2 IPTV Standard Converter</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; text-align: center; padding: 20px; }
        textarea { width: 95%; height: 400px; background: #1e1e1e; color: #f0f0f0; border: 2px solid #333; padding: 10px; border-radius: 10px; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color:white">Enigma2 Bouquet Fix for Editors</h2>
    <textarea id="box" placeholder="Paste M3U links here..."></textarea>
    <br>
    <button class="btn" onclick="startConversion()">Convert Now</button>

    <script>
        function startConversion() {
            var area = document.getElementById('box');
            var rawData = area.value;
            var lines = rawData.split('\n');
            var finalResult = "#NAME IPTV Bouquet\n";
            var currentName = "Stream";

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();

                if (line.startsWith("#EXTINF")) {
                    currentName = line.split(',').pop().trim();
                } 
                else if (line.startsWith("http")) {
                    // 1. تنظيف الرابط وفك أي تشفير
                    var rawUrl = decodeURIComponent(line);
                    
                    // 2. تحويل الرموز لـ Hexadecimal (النقطتين لـ %3a)
                    // لكن القنوات بتظهر فاضية لو مفيش %3a في آخر الرابط قبل الاسم
                    var formattedUrl = rawUrl.replace(/:/g, '%3a');
                    
                    // 3. بناء السطر بالصيغة اللي بيفهمها DreamboxEdit مية في المية
                    // الصيغة: #SERVICE 4097:0:1:0:0:0:0:0:0:الرابط_مُشفر:الاسم
                    var serviceLine = "#SERVICE 4097:0:1:0:0:0:0:0:0:" + formattedUrl + ":" + currentName + "\n";
                    
                    finalResult += serviceLine;
                    finalResult += "#DESCRIPTION " + currentName + "\n";
                }
            }
            area.value = finalResult;
            alert("تم التعديل. جرب الآن الاستيراد في البرنامج.");
        }
    </script>
</body>
</html>
